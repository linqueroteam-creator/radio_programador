<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Boas-vindas — Radio Programador</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Inter', sans-serif;
  background: #050507;
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}

/* Background animado de partículas/gradiente */
.bg-glow {
  position: absolute; inset: 0;
  background:
    radial-gradient(circle at 30% 40%, rgba(99, 102, 241, 0.25) 0%, transparent 40%),
    radial-gradient(circle at 70% 60%, rgba(236, 72, 153, 0.15) 0%, transparent 40%),
    radial-gradient(circle at 50% 100%, rgba(34, 211, 238, 0.15) 0%, transparent 50%);
  animation: drift 20s ease-in-out infinite;
}
@keyframes drift {
  0%, 100% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(20px, -10px) scale(1.05); }
}

/* Grid sutil de fundo */
.bg-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
  -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
}

/* Janela do app */
.window {
  position: relative; z-index: 10;
  width: 920px; height: 600px;
  background: linear-gradient(180deg, rgba(20,20,28,0.85) 0%, rgba(10,10,15,0.85) 100%);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  box-shadow:
    0 50px 100px rgba(0,0,0,0.5),
    0 0 80px rgba(99, 102, 241, 0.15),
    inset 0 1px 0 rgba(255,255,255,0.1);
  backdrop-filter: blur(40px);
  overflow: hidden;
  animation: windowIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes windowIn {
  from { opacity: 0; transform: scale(0.95) translateY(20px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

/* Title bar estilo macOS */
.titlebar {
  display: flex; align-items: center;
  height: 38px; padding: 0 16px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  background: rgba(255,255,255,0.02);
}
.dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; }
.dot.r { background: #ff5f57; }
.dot.y { background: #febc2e; }
.dot.g { background: #28c840; }
.titlebar-title {
  flex: 1; text-align: center;
  font-size: 12px; color: #666;
  font-family: 'JetBrains Mono', monospace; letter-spacing: 0.05em;
}

/* Conteúdo */
.content {
  padding: 80px 60px;
  display: flex; flex-direction: column;
  align-items: center; text-align: center;
  height: calc(100% - 38px);
}

/* Logo animado */
.logo {
  width: 110px; height: 110px;
  margin-bottom: 40px;
  position: relative;
  animation: float 6s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
.logo-circle {
  width: 100%; height: 100%;
  border-radius: 28px;
  background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
  display: flex; align-items: center; justify-content: center;
  box-shadow:
    0 25px 50px rgba(99, 102, 241, 0.4),
    inset 0 1px 0 rgba(255,255,255,0.3);
  position: relative;
  overflow: hidden;
}
.logo-circle::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.4), transparent 60%);
}
.logo-icon {
  font-size: 50px; font-weight: 800;
  color: #fff;
  font-family: 'JetBrains Mono', monospace;
  position: relative; z-index: 1;
  letter-spacing: -0.05em;
}

/* Pulse rings ao redor do logo */
.pulse-ring {
  position: absolute; inset: -10px;
  border: 2px solid rgba(99, 102, 241, 0.4);
  border-radius: 32px;
  animation: pulse 3s ease-out infinite;
}
.pulse-ring:nth-child(2) { animation-delay: 1s; }
.pulse-ring:nth-child(3) { animation-delay: 2s; }
@keyframes pulse {
  0% { transform: scale(0.95); opacity: 0.8; }
  100% { transform: scale(1.4); opacity: 0; }
}

/* Título */
.title {
  font-size: 48px; font-weight: 800;
  letter-spacing: -0.04em;
  background: linear-gradient(180deg, #fff 0%, #aaa 100%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 16px;
  line-height: 1.1;
}

.tagline {
  color: #888; font-size: 17px;
  font-weight: 400; line-height: 1.6;
  max-width: 480px;
  margin-bottom: 48px;
}

/* CTA Button */
.btn {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 16px 32px;
  background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
  border: none;
  border-radius: 12px;
  color: #fff;
  font-family: inherit;
  font-size: 15px; font-weight: 600;
  cursor: pointer;
  box-shadow:
    0 10px 30px rgba(99, 102, 241, 0.4),
    0 0 0 1px rgba(255,255,255,0.1) inset;
  transition: all 0.3s ease;
  letter-spacing: -0.01em;
}
.btn:hover {
  transform: translateY(-2px);
  box-shadow:
    0 15px 40px rgba(99, 102, 241, 0.5),
    0 0 0 1px rgba(255,255,255,0.2) inset;
}
.btn-arrow {
  transition: transform 0.3s ease;
}
.btn:hover .btn-arrow { transform: translateX(4px); }

/* Versão e dica */
.version {
  margin-top: 32px;
  display: flex; gap: 24px; align-items: center;
  color: #555; font-size: 12px;
  font-family: 'JetBrains Mono', monospace;
}
.version-tag {
  padding: 4px 10px;
  background: rgba(99, 102, 241, 0.1);
  border: 1px solid rgba(99, 102, 241, 0.3);
  color: #a5b4fc;
  border-radius: 6px;
  font-weight: 500;
}

/* Voltar */
.back {
  position: fixed; top: 24px; left: 24px;
  z-index: 100;
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 10px;
  color: #aaa; font-size: 13px; text-decoration: none;
  transition: all 0.2s ease;
  backdrop-filter: blur(10px);
}
.back:hover { background: rgba(255,255,255,0.1); color: #fff; }
</style>
</head>
<body>
<a href="INDEX.html" class="back">← Voltar aos mockups</a>

<div class="bg-glow"></div>
<div class="bg-grid"></div>

<div class="window">
  <div class="titlebar">
    <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="titlebar-title">Radio Programador</span>
  </div>

  <div class="content">
    <div class="logo">
      <div class="pulse-ring"></div>
      <div class="pulse-ring"></div>
      <div class="pulse-ring"></div>
      <div class="logo-circle">
        <span class="logo-icon">RP</span>
      </div>
    </div>

    <h1 class="title">Bem-vindo ao seu novo<br>radar de rede.</h1>
    <p class="tagline">
      Veja quem está conectado. Bloqueie quem não deve estar.<br>
      Tudo num só lugar, em segundos.
    </p>

    <button class="btn">
      Vamos começar
      <span class="btn-arrow">→</span>
    </button>

    <div class="version">
      <span class="version-tag">v8.0 Premium</span>
      <span>Windows 11 · 2026</span>
    </div>
  </div>
</div>
</body>
</html>
